# Reverse proxy: / -> Streamlit dashboard, /api/ -> FastAPI (prefix stripped
# by the trailing slash on proxy_pass). See PLAN.md §11, CLAUDE.md Week 7.
#
# Hostname is 18-133-210-144.sslip.io, not the EC2 public DNS name - Let's
# Encrypt's ACME server explicitly refuses to issue certificates for
# *.compute.amazonaws.com (blocked by policy, confirmed by testing it - not
# documented anywhere obvious upfront). sslip.io resolves <ip-with-dashes>.
# sslip.io to that IP automatically (no DNS setup needed) and isn't on the
# block list, so certbot can issue a real cert for it. If the Elastic IP
# ever changes, this hostname (and the cert) need updating to match.
#
# This file is the source of truth for the proxy rules and is deployed onto
# the EC2 box at /etc/nginx/sites-available/ - nginx and certbot themselves
# run on the host, not in a container, so TLS termination doesn't need to
# cross the Docker network. `certbot --nginx` edits the deployed copy on the
# box in place to add the 443 server block + HTTP->HTTPS redirect; those
# edits aren't synced back here, so re-run certbot after redeploying this
# file if the box's nginx config is ever reset from scratch.

server {
    listen 80;
    server_name 18-133-210-144.sslip.io;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streamlit needs WebSocket upgrade support for its live UI updates.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
